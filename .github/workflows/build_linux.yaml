name: Build Linux

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Update dependencies
        run: sudo apt-get update

      - name: Install dependencies
        run: sudo apt install gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev libappindicator3-dev

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.0

      - name: Update Version in debrief.desktop
        run: |
          VERSION=${{ github.event.release.tag_name }}
          sed -i "s/^Version=.*/Version=${VERSION:1}/" build/desktop-assets/debrief.desktop

      - name: Build linux amd64
        run: make build_linux

      - name: Upload Release Asset
        run: |
          gh release upload ${{github.event.release.tag_name}} ./dist/debrief-linux-${{ github.ref_name }}-amd64.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
