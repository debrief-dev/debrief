name: build
on:
  push:
    branches:
    - main
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: set up go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
        id: go
      - name: Go Mod Download
        run: go mod download
      - name: Go Mod Verify
        run: go mod verify
      - name: Go Tidy
        run: go mod tidy && git diff --exit-code
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
      - name: Format
        run: golangci-lint fmt && git diff --exit-code
      - name: Build
        run: go build -o debrief .
      - name: Test
        run: go test -v -timeout=100s -covermode=count ./...
