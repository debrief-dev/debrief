name: debrief
arch: ${ARCH}
platform: linux
version: ${VERSION}
maintainer: bosiakov
description: Debrief - Hyper-charged reverse search
homepage: https://github.com/debrief-dev/debrief
license: MIT

overrides:
  deb:
    depends:
      - libwayland-client0
      - libx11-6
      - libxkbcommon-x11-0
      - libgles2
      - libegl1
      - libxcursor1
      - libvulkan1
  rpm:
    depends:
      - libwayland-client
      - libX11
      - libxkbcommon-x11
      - mesa-libGLESv2
      - mesa-libEGL
      - libXcursor
      - vulkan-loader
  archlinux:
    depends:
      - wayland
      - libx11
      - libxkbcommon-x11
      - mesa
      - libxcursor
      - vulkan-icd-loader

contents:
  - src: ./dist/linux/debrief
    dst: /usr/bin/debrief
    file_info:
      mode: 0755

  - src: ./assets/desktop-assets/debrief.desktop
    dst: /usr/share/applications/debrief.desktop
    file_info:
      mode: 0644

  - src: ./assets/appicon.png
    dst: /usr/share/icons/hicolor/256x256/apps/debrief.png
    file_info:
      mode: 0644

  - src: ./LICENSE
    dst: /usr/share/doc/debrief/LICENSE
    file_info:
      mode: 0644
